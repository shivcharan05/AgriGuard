<!DOCTYPE html>
<html>

<head>
<title>Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">

</head>

<body>

<div class="container">

<h2>Dashboard</h2>

<div class="card-container">

<div class="card">
<h3>Total Animals</h3>
<p>Manage your animals</p>
<button  onclick="goToAnimals()" >View</button>
</div>

<div class="card">
<h3>Disease Detection</h3>
<p>Upload image to detect disease</p>
<button  onclick="goToDisease()">Check</button>
</div>

<div class="card">
<h3>Vaccination</h3>
<p>Track vaccination schedule</p>
<button  onclick="goToVaccination()">Open</button>
</div>

<div class="card">
<h3>Outbreak Map</h3>
<p>See disease outbreaks</p>
<button  onclick="goToMap()">View Map</button>
</div>


</div>

</div>
<div id="footer"></div>

<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
