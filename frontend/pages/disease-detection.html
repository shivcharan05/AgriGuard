<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disease Detection</title>

<link rel="stylesheet" href="../css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f7f6;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

.header{
width:100%;
background:linear-gradient(90deg,#2e7d32,#43a047);
color:white;
text-align:center;
padding:30px 10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header h1{
font-size:36px;
}

/* MAIN AREA */

.main{
margin-top:50px;
width:80%;
max-width:800px;
text-align:center;
}

/* UPLOAD BOX */

.upload-box{
border:2px dashed #2e7d32;
padding:40px;
border-radius:15px;
background:white;
transition:0.3s;
}

.upload-box:hover{
background:#f1f8e9;
transform:scale(1.02);
}

/* FILE INPUT */

input[type="file"]{
margin-top:20px;
}

/* BUTTON */

button{
margin-top:25px;
padding:14px 35px;
font-size:16px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#2e7d32,#43a047);
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
background:linear-gradient(45deg,#1b5e20,#2e7d32);
}

/* RESULT PANEL */

#result{
margin-top:40px;
padding:20px;
border-radius:10px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
font-size:18px;
color:#2e7d32;
min-height:40px;
}

/* IMAGE PREVIEW */

#preview{
margin-top:20px;
max-width:300px;
display:none;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="header">
<h1>Livestock Disease Detection</h1>
</div>

<div class="main">

<div class="upload-box">

<p>Upload an image of the animal to detect possible diseases using AI</p>

<input type="file" id="image" onchange="previewImage(event)">

<br>

<img id="preview">

</div>

<button onclick="uploadImage()">Detect Disease</button>

<div id="result">Result</div>

</div>
</div>

<script>

function previewImage(event){
const preview=document.getElementById("preview");
preview.src=URL.createObjectURL(event.target.files[0]);
preview.style.display="block";
}

</script>

<script src="../js/disease.js"></script>

</body>
</html>
