<!DOCTYPE html>
<html>
<head>
<title>Add Animal</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<h2>Add Animal Profile</h2>

<form id="animalForm">

<input type="text" id="name" placeholder="Animal Name" required>

<input type="text" id="species" placeholder="Species">

<input type="text" id="breed" placeholder="Breed">

<input type="number" id="age" placeholder="Age">

<input type="text" id="vaccinations" placeholder="Vaccinations">

<input type="text" id="diseases" placeholder="Diseases">

<input type="text" id="treatment" placeholder="Treatment History">

<input type="file" id="image">

<button type="submit">Add Animal</button>

</form>


</body>
</html>
